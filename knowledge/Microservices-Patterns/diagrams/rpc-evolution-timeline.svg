<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" role="img">
  <title>Lịch sử tiến hóa RPC — từ CORBA đến gRPC</title>
  <desc>Timeline so sánh các thế hệ RPC framework và vấn đề từng thế hệ giải quyết</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; }
      .th  { font-size: 13px; font-weight: 600; }
      .ts  { font-size: 11px; fill: #555; }
      .box-coral  { fill: #FAECE7; stroke: #993C1D; }
      .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
      .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
      .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
      .box-purple { fill: #EEEDFE; stroke: #534AB7; }
      .box-summary{ fill: #fafafa; stroke: #ddd; }
      .arr { fill: none; stroke: #aaa; stroke-width: 1.1; marker-end: url(#arrow); }
    </style>
  </defs>

  <!-- Timeline axis -->
  <line x1="60" y1="80" x2="645" y2="80" stroke="#bbb" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Year ticks + labels -->
  <g class="ts">
    <line x1="80"  y1="75" x2="80"  y2="85" stroke="#bbb" stroke-width="1"/>
    <text x="80"  y="66" text-anchor="middle">1991</text>
    <line x1="200" y1="75" x2="200" y2="85" stroke="#bbb" stroke-width="1"/>
    <text x="200" y="66" text-anchor="middle">1998</text>
    <line x1="330" y1="75" x2="330" y2="85" stroke="#bbb" stroke-width="1"/>
    <text x="330" y="66" text-anchor="middle">2007</text>
    <line x1="450" y1="75" x2="450" y2="85" stroke="#bbb" stroke-width="1"/>
    <text x="450" y="66" text-anchor="middle">2015</text>
    <line x1="570" y1="75" x2="570" y2="85" stroke="#bbb" stroke-width="1"/>
    <text x="570" y="66" text-anchor="middle">2023+</text>
  </g>

  <!-- Drop lines -->
  <line x1="80"  y1="80" x2="80"  y2="112" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="200" y1="80" x2="200" y2="112" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="330" y1="80" x2="330" y2="112" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="450" y1="80" x2="450" y2="112" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="570" y1="80" x2="570" y2="112" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2"/>

  <!-- CORBA / DCE -->
  <rect x="20"  y="112" width="128" height="80" rx="8" class="box-coral" stroke-width="0.8"/>
  <text class="th" x="84" y="130" text-anchor="middle" dominant-baseline="central">CORBA / DCE</text>
  <text class="ts" x="84" y="148" text-anchor="middle">IDL + IIOP binary</text>
  <text class="ts" x="84" y="163" text-anchor="middle">❌ Vendor lock-in</text>
  <text class="ts" x="84" y="178" text-anchor="middle">❌ Spec 1000 trang</text>

  <!-- XML-RPC / SOAP -->
  <rect x="148" y="112" width="130" height="94" rx="8" class="box-amber" stroke-width="0.8"/>
  <text class="th" x="213" y="130" text-anchor="middle" dominant-baseline="central">XML-RPC / SOAP</text>
  <text class="ts" x="213" y="148" text-anchor="middle">HTTP + XML payload</text>
  <text class="ts" x="213" y="163" text-anchor="middle">✅ Firewall-friendly</text>
  <text class="ts" x="213" y="178" text-anchor="middle">❌ XML verbosity</text>
  <text class="ts" x="213" y="193" text-anchor="middle">❌ WSDL hell</text>

  <!-- Thrift / Avro -->
  <rect x="278" y="112" width="130" height="94" rx="8" class="box-gray" stroke-width="0.8"/>
  <text class="th" x="343" y="130" text-anchor="middle" dominant-baseline="central">Thrift / Avro</text>
  <text class="ts" x="343" y="148" text-anchor="middle">Binary serialization</text>
  <text class="ts" x="343" y="163" text-anchor="middle">✅ Compact payload</text>
  <text class="ts" x="343" y="178" text-anchor="middle">❌ TCP tự quản lý</text>
  <text class="ts" x="343" y="193" text-anchor="middle">❌ No streaming</text>

  <!-- gRPC -->
  <rect x="396" y="112" width="130" height="108" rx="8" class="box-teal" stroke-width="0.8"/>
  <text class="th" x="461" y="130" text-anchor="middle" dominant-baseline="central">gRPC (Google)</text>
  <text class="ts" x="461" y="148" text-anchor="middle">HTTP/2 + Protobuf</text>
  <text class="ts" x="461" y="163" text-anchor="middle">✅ Binary compact</text>
  <text class="ts" x="461" y="178" text-anchor="middle">✅ 4 streaming modes</text>
  <text class="ts" x="461" y="193" text-anchor="middle">✅ Code generation</text>
  <text class="ts" x="461" y="208" text-anchor="middle">✅ Multiplexing</text>

  <!-- gRPC + Connect -->
  <rect x="524" y="112" width="130" height="108" rx="8" class="box-purple" stroke-width="0.8"/>
  <text class="th" x="589" y="130" text-anchor="middle" dominant-baseline="central">gRPC + Connect</text>
  <text class="ts" x="589" y="148" text-anchor="middle">HTTP/3 (QUIC) sắp tới</text>
  <text class="ts" x="589" y="163" text-anchor="middle">✅ gRPC-Web</text>
  <text class="ts" x="589" y="178" text-anchor="middle">✅ Connect protocol</text>
  <text class="ts" x="589" y="193" text-anchor="middle">✅ OpenTelemetry</text>
  <text class="ts" x="589" y="208" text-anchor="middle">✅ Service mesh</text>

  <!-- Evolution arrows between boxes -->
  <line x1="150" y1="158" x2="196" y2="158" class="arr"/>
  <line x1="280" y1="160" x2="326" y2="160" class="arr"/>
  <line x1="410" y1="160" x2="444" y2="160" class="arr"/>
  <line x1="528" y1="166" x2="562" y2="166" class="arr"/>

  <text class="ts" x="173" y="152" text-anchor="middle" style="fill:#854F0B">fix</text>
  <text class="ts" x="303" y="154" text-anchor="middle" style="fill:#854F0B">fix</text>
  <text class="ts" x="427" y="154" text-anchor="middle" style="fill:#0F6E56">fix</text>
  <text class="ts" x="545" y="160" text-anchor="middle" style="fill:#534AB7">++</text>

  <!-- Pain summary -->
  <rect x="20" y="250" width="640" height="46" rx="8" class="box-summary" stroke-width="0.5"/>
  <text class="th" x="340" y="268" text-anchor="middle" dominant-baseline="central">Vấn đề cốt lõi RPC cũ chưa giải quyết được đồng thời</text>
  <text class="ts" x="340" y="286" text-anchor="middle">Transport cứng nhắc · Serialization kém · Không có streaming · Schema không strict · Khó debug</text>

  <!-- gRPC answer -->
  <rect x="20" y="312" width="640" height="46" rx="8" class="box-teal" stroke-width="0.8"/>
  <text class="th" x="340" y="330" text-anchor="middle" dominant-baseline="central">gRPC ghép đúng 3 công nghệ chín muồi vào đúng thời điểm</text>
  <text class="ts" x="340" y="348" text-anchor="middle" style="fill:#0F6E56">HTTP/2 (transport) · Protobuf (serialization) · Code gen + .proto (schema enforcement)</text>

  <!-- Not new idea note -->
  <rect x="20" y="374" width="640" height="28" rx="6" class="box-summary" stroke-width="0.5"/>
  <text class="ts" x="340" y="391" text-anchor="middle">gRPC không phát minh lại RPC — nó kế thừa IDL từ CORBA, binary từ Thrift, build đúng lúc HTTP/2 ra đời năm 2015</text>
</svg>
