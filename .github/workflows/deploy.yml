name: Deploy Portfolio and Knowledge Base

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Portfolio Dependencies
        run: npm install

      - name: Build Portfolio
        run: npm run build

      - name: Install Quartz Dependencies
        run: |
          cd quartz
          npm install

      - name: Build Quartz
        run: |
          cd quartz
          npx quartz build

      - name: Merge Builds
        run: |
          mkdir -p dist/knowledge
          cp -r quartz/public/* dist/knowledge/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
