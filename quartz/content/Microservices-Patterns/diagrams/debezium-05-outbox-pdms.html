<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debezium + Outbox Pattern trong PDMS</title>
<style>
  :root {
    --bg: #1e1e2e; --text: #cdd6f4; --text2: #a6adc8; --text3: #6c7086;
    --surface: #2a2a3e; --surface2: #313145; --border: #45475a;
    --green: #a6e3a1; --green-bg: #1e3a2e; --green-border: #2d5a3d;
    --blue: #89b4fa; --blue-bg: #1e2d4a; --blue-border: #2d4a7a;
    --amber: #f9e2af; --amber-bg: #3a2e10; --amber-border: #6a5018;
    --teal: #94e2d5; --teal-bg: #1a3535; --teal-border: #2a5555;
    --purple: #cba6f7; --purple-bg: #2d1a4a; --purple-border: #5a3a7a;
    --coral: #fab387; --coral-bg: #3a2010; --coral-border: #6a4020;
    --gray-fill: #313145; --gray-border: #45475a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #eff1f5; --text: #4c4f69; --text2: #6c6f85; --text3: #9ca0b0;
      --surface: #e6e9ef; --surface2: #dce0e8; --border: #ccd0da;
      --green: #40a02b; --green-bg: #e8f5e0; --green-border: #b5d9a0;
      --blue: #1e66f5; --blue-bg: #ddeeff; --blue-border: #89b4fa;
      --amber: #df8e1d; --amber-bg: #fef3d8; --amber-border: #f9e2af;
      --teal: #179299; --teal-bg: #d8f5f3; --teal-border: #94e2d5;
      --purple: #8839ef; --purple-bg: #efe8ff; --purple-border: #cba6f7;
      --coral: #fe640b; --coral-bg: #ffe8d8; --coral-border: #fab387;
      --gray-fill: #e6e9ef; --gray-border: #ccd0da;
    }
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,'Segoe UI',sans-serif; font-size:13px; padding:16px; }
  svg { width:100%; height:auto; display:block; }
  .t  { font: 400 14px/1.4 -apple-system,'Segoe UI',sans-serif; fill:var(--text); }
  .ts { font: 400 12px/1.4 -apple-system,'Segoe UI',sans-serif; fill:var(--text2); }
  .th { font: 500 14px/1.4 -apple-system,'Segoe UI',sans-serif; fill:var(--text); }
  .c-gray rect { fill:var(--gray-fill); stroke:var(--gray-border); } .c-gray .th,.c-gray .ts { fill:var(--text); }
  .c-blue rect { fill:var(--blue-bg); stroke:var(--blue-border); } .c-blue .th,.c-blue .ts { fill:var(--blue); }
  .c-amber rect { fill:var(--amber-bg); stroke:var(--amber-border); } .c-amber .th,.c-amber .ts { fill:var(--amber); }
  .c-teal rect { fill:var(--teal-bg); stroke:var(--teal-border); } .c-teal .th,.c-teal .ts { fill:var(--teal); }
  .c-purple rect { fill:var(--purple-bg); stroke:var(--purple-border); } .c-purple .th,.c-purple .ts { fill:var(--purple); }
  .c-coral rect { fill:var(--coral-bg); stroke:var(--coral-border); } .c-coral .th,.c-coral .ts { fill:var(--coral); }
  .c-green rect { fill:var(--green-bg); stroke:var(--green-border); } .c-green .th,.c-green .ts { fill:var(--green); }
</style>
</head>
<body>
<svg viewBox="0 0 680 390" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Debezium + Transactional Outbox trong PDMS</title>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<text class="th" x="340" y="28" text-anchor="middle">PDMS: Debezium + Outbox Pattern</text>
<!-- Service -->
<g class="c-gray"><rect x="40" y="50" width="180" height="100" rx="10" stroke-width="0.5"/><text class="th" x="130" y="72" text-anchor="middle">Document Service</text><text class="ts" x="130" y="92" text-anchor="middle">approveDocument(id)</text></g>
<!-- Transaction bracket -->
<line x1="30" y1="50" x2="30" y2="150" stroke="var(--border)" stroke-width="1" stroke-dasharray="2 2"/>
<line x1="248" y1="50" x2="248" y2="150" stroke="var(--border)" stroke-width="1" stroke-dasharray="2 2"/>
<line x1="30" y1="55" x2="38" y2="55" stroke="var(--border)" stroke-width="0.5"/>
<line x1="240" y1="55" x2="248" y2="55" stroke="var(--border)" stroke-width="0.5"/>
<text class="ts" x="139" y="44" text-anchor="middle">— 1 Database Transaction —</text>
<!-- PostgreSQL -->
<g class="c-blue"><rect x="40" y="175" width="180" height="80" rx="10" stroke-width="0.5"/><text class="th" x="130" y="197" text-anchor="middle">PostgreSQL</text></g>
<g class="c-gray"><rect x="55" y="208" width="72" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="91" y="226" text-anchor="middle" dominant-baseline="central">documents</text></g>
<g class="c-amber"><rect x="135" y="208" width="72" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="171" y="226" text-anchor="middle" dominant-baseline="central">outbox_events</text></g>
<!-- Arrows service → tables -->
<line x1="91" y1="150" x2="91" y2="173" stroke="var(--blue-border)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="130" y1="150" x2="171" y2="206" stroke="var(--amber-border)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="60" y="166" text-anchor="start" fill="var(--blue)">1. update</text>
<text class="ts" x="150" y="188" text-anchor="start" fill="var(--amber)">2. insert event</text>
<!-- WAL -->
<g class="c-amber"><rect x="40" y="280" width="180" height="34" rx="8" stroke-width="0.5"/><text class="th" x="130" y="302" text-anchor="middle" dominant-baseline="central">WAL (logs cả 2 writes)</text></g>
<line x1="130" y1="255" x2="130" y2="278" stroke="var(--amber)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<!-- Debezium -->
<g class="c-teal"><rect x="280" y="265" width="130" height="60" rx="10" stroke-width="0.5"/><text class="th" x="345" y="288" text-anchor="middle">Debezium</text><text class="ts" x="345" y="308" text-anchor="middle">Outbox Event Router</text></g>
<line x1="222" y1="297" x2="278" y2="297" stroke="var(--teal)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="250" y="288" text-anchor="middle">reads WAL</text>
<!-- Kafka Topics -->
<g class="c-purple"><rect x="460" y="220" width="200" height="130" rx="10" stroke-width="0.5"/><text class="th" x="560" y="242" text-anchor="middle">Kafka Topics</text></g>
<g class="c-gray"><rect x="474" y="255" width="170" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="559" y="269" text-anchor="middle" dominant-baseline="central">pdms.document-approved</text></g>
<g class="c-gray"><rect x="474" y="291" width="170" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="559" y="305" text-anchor="middle" dominant-baseline="central">pdms.contract-updated</text></g>
<g class="c-gray"><rect x="474" y="327" width="170" height="14" rx="4" stroke-width="0.5"/><text class="ts" x="559" y="334" text-anchor="middle" dominant-baseline="central">... (route theo aggregate_type)</text></g>
<line x1="410" y1="297" x2="458" y2="280" stroke="var(--purple)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<!-- Consumers -->
<g class="c-coral"><rect x="460" y="60" width="200" height="140" rx="10" stroke-width="0.5"/><text class="th" x="560" y="82" text-anchor="middle">Downstream Consumers</text></g>
<g class="c-gray"><rect x="474" y="95" width="170" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="559" y="109" text-anchor="middle" dominant-baseline="central">Workflow Service</text></g>
<g class="c-gray"><rect x="474" y="131" width="170" height="28" rx="6" stroke-width="0.5"/><text class="ts" x="559" y="145" text-anchor="middle" dominant-baseline="central">Notification Service</text></g>
<g class="c-gray"><rect x="474" y="167" width="170" height="25" rx="6" stroke-width="0.5"/><text class="ts" x="559" y="179" text-anchor="middle" dominant-baseline="central">Audit Service</text></g>
<line x1="560" y1="218" x2="560" y2="200" stroke="var(--coral)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<!-- Insight -->
<g class="c-green"><rect x="40" y="330" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="ts" x="130" y="348" text-anchor="middle">Atomicity đảm bảo:</text>
<text class="ts" x="130" y="364" text-anchor="middle">DB update + event trong</text>
<text class="ts" x="130" y="374" text-anchor="middle">cùng 1 transaction</text></g>
</svg>
</body>
</html>
