<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiến trúc Debezium — WAL đến Kafka Consumers</title>
<style>
  :root {
    --bg: #1e1e2e; --bg2: #2a2a3e; --bg3: #313145;
    --text: #cdd6f4; --text2: #a6adc8; --text3: #6c7086;
    --green: #a6e3a1; --green-bg: #1e3a2e; --green-border: #2d5a3d;
    --red: #f38ba8; --red-bg: #3a1e2a;
    --blue: #89b4fa; --amber: #f9e2af; --teal: #94e2d5; --purple: #cba6f7; --coral: #fab387;
    --gray-fill: #313145; --gray-border: #45475a; --border: #45475a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #eff1f5; --bg2: #e6e9ef; --bg3: #dce0e8;
      --text: #4c4f69; --text2: #6c6f85; --text3: #9ca0b0;
      --green: #40a02b; --green-bg: #e8f5e0; --green-border: #b5d9a0;
      --red: #d20f39; --red-bg: #fce8ee;
      --blue: #1e66f5; --amber: #df8e1d; --teal: #179299; --purple: #8839ef; --coral: #fe640b;
      --gray-fill: #e6e9ef; --gray-border: #ccd0da; --border: #ccd0da;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system,'Segoe UI',sans-serif; font-size:13px; padding:16px; }
  svg { width:100%; height:auto; display:block; }
  .t  { font: 400 14px/1.4 -apple-system,'Segoe UI',sans-serif; fill: var(--text); }
  .ts { font: 400 12px/1.4 -apple-system,'Segoe UI',sans-serif; fill: var(--text2); }
  .th { font: 500 14px/1.4 -apple-system,'Segoe UI',sans-serif; fill: var(--text); }
  .arr { stroke: var(--text3); fill: none; stroke-width: 1.5; }
  .c-gray rect { fill: var(--gray-fill); stroke: var(--gray-border); }
  .c-gray .th, .c-gray .ts { fill: var(--text); }
  .c-blue rect { fill: #1e2d4a; stroke: #2d4a7a; } .c-blue .th,.c-blue .ts { fill: var(--blue); }
  .c-teal rect { fill: #1a3535; stroke: #2a5555; } .c-teal .th,.c-teal .ts { fill: var(--teal); }
  .c-amber rect { fill: #3a2e10; stroke: #6a5018; } .c-amber .th,.c-amber .ts { fill: var(--amber); }
  .c-purple rect { fill: #2d1a4a; stroke: #5a3a7a; } .c-purple .th,.c-purple .ts { fill: var(--purple); }
  .c-coral rect { fill: #3a2010; stroke: #6a4020; } .c-coral .th,.c-coral .ts { fill: var(--coral); }
  @media (prefers-color-scheme: light) {
    .c-blue rect { fill: #ddeeff; stroke: #89b4fa; }
    .c-teal rect { fill: #d8f5f3; stroke: #94e2d5; }
    .c-amber rect { fill: #fef3d8; stroke: #f9e2af; }
    .c-purple rect { fill: #efe8ff; stroke: #cba6f7; }
    .c-coral rect { fill: #ffe8d8; stroke: #fab387; }
    .c-blue .th,.c-blue .ts { fill: #1e66f5; }
    .c-teal .th,.c-teal .ts { fill: #179299; }
    .c-amber .th,.c-amber .ts { fill: #df8e1d; }
    .c-purple .th,.c-purple .ts { fill: #8839ef; }
    .c-coral .th,.c-coral .ts { fill: #fe640b; }
  }
</style>
</head>
<body>
<svg viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kiến trúc Debezium: từ PostgreSQL WAL đến Kafka consumers</title>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<!-- PostgreSQL container -->
<g class="c-blue"><rect x="30" y="30" width="160" height="160" rx="12" stroke-width="0.5"/><text class="th" x="110" y="52" text-anchor="middle">PostgreSQL</text></g>
<g class="c-gray"><rect x="48" y="65" width="125" height="34" rx="6" stroke-width="0.5"/><text class="ts" x="110" y="82" text-anchor="middle" dominant-baseline="central">documents table</text></g>
<g class="c-gray"><rect x="48" y="105" width="125" height="34" rx="6" stroke-width="0.5"/><text class="ts" x="110" y="122" text-anchor="middle" dominant-baseline="central">contracts table</text></g>
<g class="c-amber"><rect x="48" y="148" width="125" height="32" rx="6" stroke-width="0.5"/><text class="ts" x="110" y="164" text-anchor="middle" dominant-baseline="central">WAL (Write-Ahead Log)</text></g>
<line x1="110" y1="99" x2="110" y2="146" class="arr" marker-end="url(#arrow)" stroke="#f9e2af"/>
<!-- Replication Slot -->
<g class="c-amber"><rect x="30" y="215" width="160" height="55" rx="10" stroke-width="0.5"/><text class="th" x="110" y="235" text-anchor="middle">Replication Slot</text><text class="ts" x="110" y="254" text-anchor="middle">"debezium_slot"</text></g>
<line x1="110" y1="180" x2="110" y2="213" class="arr" marker-end="url(#arrow)" stroke="#f9e2af"/>
<text class="ts" x="195" y="243" text-anchor="start" fill="var(--text2)">pgoutput</text>
<text class="ts" x="195" y="257" text-anchor="start" fill="var(--text2)">plugin</text>
<!-- Kafka Connect + Debezium -->
<g class="c-teal"><rect x="240" y="30" width="200" height="240" rx="12" stroke-width="0.5"/><text class="th" x="340" y="52" text-anchor="middle">Kafka Connect</text></g>
<g class="c-gray"><rect x="258" y="65" width="165" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="82" text-anchor="middle">Debezium Connector</text><text class="ts" x="340" y="100" text-anchor="middle">PostgresConnector.class</text></g>
<g class="c-gray"><rect x="258" y="120" width="165" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="137" text-anchor="middle">SMT Pipeline</text><text class="ts" x="340" y="155" text-anchor="middle">unwrap → filter → route</text></g>
<g class="c-gray"><rect x="258" y="175" width="165" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="192" text-anchor="middle">Serializer</text><text class="ts" x="340" y="210" text-anchor="middle">Avro + Schema Registry</text></g>
<g class="c-gray"><rect x="258" y="230" width="165" height="30" rx="6" stroke-width="0.5"/><text class="ts" x="340" y="249" text-anchor="middle" dominant-baseline="central">Offset → connect-offsets topic</text></g>
<line x1="192" y1="242" x2="236" y2="200" class="arr" marker-end="url(#arrow)" stroke="#94e2d5"/>
<line x1="340" y1="109" x2="340" y2="118" class="arr" marker-end="url(#arrow)" stroke="#94e2d5"/>
<line x1="340" y1="164" x2="340" y2="173" class="arr" marker-end="url(#arrow)" stroke="#94e2d5"/>
<!-- Kafka Topics -->
<g class="c-purple"><rect x="480" y="30" width="180" height="240" rx="12" stroke-width="0.5"/><text class="th" x="570" y="52" text-anchor="middle">Kafka Topics</text></g>
<g class="c-gray"><rect x="496" y="65" width="148" height="34" rx="6" stroke-width="0.5"/><text class="ts" x="570" y="82" text-anchor="middle" dominant-baseline="central">pdms.documents</text></g>
<g class="c-gray"><rect x="496" y="107" width="148" height="34" rx="6" stroke-width="0.5"/><text class="ts" x="570" y="124" text-anchor="middle" dominant-baseline="central">pdms.contracts</text></g>
<g class="c-gray"><rect x="496" y="149" width="148" height="34" rx="6" stroke-width="0.5"/><text class="ts" x="570" y="166" text-anchor="middle" dominant-baseline="central">pdms.customers</text></g>
<g class="c-amber"><rect x="496" y="200" width="148" height="34" rx="6" stroke-width="0.5"/><text class="ts" x="570" y="217" text-anchor="middle" dominant-baseline="central">connect-offsets (internal)</text></g>
<line x1="444" y1="150" x2="478" y2="150" class="arr" marker-end="url(#arrow)" stroke="#cba6f7"/>
<!-- Consumers -->
<g class="c-coral"><rect x="30" y="315" width="130" height="50" rx="10" stroke-width="0.5"/><text class="th" x="95" y="336" text-anchor="middle">Search Service</text><text class="ts" x="95" y="353" text-anchor="middle">Elasticsearch sync</text></g>
<g class="c-coral"><rect x="175" y="315" width="130" height="50" rx="10" stroke-width="0.5"/><text class="th" x="240" y="336" text-anchor="middle">Cache Service</text><text class="ts" x="240" y="353" text-anchor="middle">Redis invalidation</text></g>
<g class="c-coral"><rect x="320" y="315" width="130" height="50" rx="10" stroke-width="0.5"/><text class="th" x="385" y="336" text-anchor="middle">Audit Service</text><text class="ts" x="385" y="353" text-anchor="middle">Lưu audit log</text></g>
<g class="c-coral"><rect x="465" y="315" width="175" height="50" rx="10" stroke-width="0.5"/><text class="th" x="552" y="336" text-anchor="middle">Notification Service</text><text class="ts" x="552" y="353" text-anchor="middle">Push alert realtime</text></g>
<line x1="570" y1="270" x2="110" y2="313" class="arr" marker-end="url(#arrow)" stroke="#fab387" fill="none"/>
<line x1="570" y1="270" x2="250" y2="313" class="arr" marker-end="url(#arrow)" stroke="#fab387" fill="none"/>
<line x1="570" y1="270" x2="390" y2="313" class="arr" marker-end="url(#arrow)" stroke="#fab387" fill="none"/>
<line x1="570" y1="270" x2="552" y2="313" class="arr" marker-end="url(#arrow)" stroke="#fab387" fill="none"/>
<!-- Notes -->
<text class="ts" x="340" y="420" text-anchor="middle">Key = Primary Key → same partition → ordering per row</text>
<text class="ts" x="340" y="440" text-anchor="middle">At-least-once delivery → consumer phải idempotent</text>
<text class="ts" x="340" y="460" text-anchor="middle">Replication slot giữ WAL → zero data loss khi Debezium down</text>
</svg>
</body>
</html>
