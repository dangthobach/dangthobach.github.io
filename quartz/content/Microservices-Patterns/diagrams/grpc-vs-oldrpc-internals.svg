<svg xmlns="http://www.w3.org/2000/svg" width="680" height="580" viewBox="0 0 680 580" role="img">
  <title>gRPC internals vs RPC cũ — so sánh từng lớp</title>
  <desc>So sánh 4 lớp kiến trúc giữa SOAP/REST/RPC cũ và gRPC hiện đại</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; }
      .th  { font-size: 13px; font-weight: 600; }
      .ts  { font-size: 11px; fill: #555; }
      .ts-ok  { font-size: 11px; fill: #0F6E56; }
      .ts-bad { font-size: 11px; fill: #993C1D; }
      .hdr-old   { fill: #FAECE7; stroke: #993C1D; }
      .hdr-new   { fill: #E1F5EE; stroke: #0F6E56; }
      .cell-old  { fill: #fdf7f5; stroke: #f0c4b4; }
      .cell-new  { fill: #f2fbf7; stroke: #9fe1cb; }
      .lbl-row   { fill: #fafafa; stroke: #e0e0e0; }
      .sum-purple{ fill: #EEEDFE; stroke: #534AB7; }
    </style>
  </defs>

  <!-- Column headers -->
  <rect x="20"  y="16" width="290" height="38" rx="8" class="hdr-old" stroke-width="0.8"/>
  <text class="th" x="165" y="35" text-anchor="middle" dominant-baseline="central">RPC cũ — SOAP / XML-RPC / REST+JSON</text>

  <text class="th" x="340" y="35" text-anchor="middle" dominant-baseline="central" style="fill:#888">VS</text>

  <rect x="370" y="16" width="290" height="38" rx="8" class="hdr-new" stroke-width="0.8"/>
  <text class="th" x="515" y="35" text-anchor="middle" dominant-baseline="central">gRPC — HTTP/2 + Protobuf</text>

  <!-- ─── LAYER 1: Transport ─── -->
  <rect x="20" y="70" width="640" height="18" rx="4" class="lbl-row" stroke-width="0.5"/>
  <text class="ts" x="340" y="81" text-anchor="middle" dominant-baseline="central" style="fill:#534AB7; font-weight:600">① Transport layer</text>

  <rect x="20"  y="92" width="290" height="80" rx="6" class="cell-old" stroke-width="0.5"/>
  <text class="th"  x="165" y="110" text-anchor="middle" dominant-baseline="central">HTTP/1.1 — 1 req per connection</text>
  <text class="ts-bad" x="165" y="128" text-anchor="middle">❌ Head-of-line blocking</text>
  <text class="ts-bad" x="165" y="144" text-anchor="middle">❌ Text headers không nén (~400 bytes/req)</text>
  <text class="ts-bad" x="165" y="160" text-anchor="middle">❌ Mỗi request mở lại connection</text>

  <rect x="370" y="92" width="290" height="80" rx="6" class="cell-new" stroke-width="0.5"/>
  <text class="th"  x="515" y="110" text-anchor="middle" dominant-baseline="central">HTTP/2 — N streams / 1 connection</text>
  <text class="ts-ok" x="515" y="128" text-anchor="middle">✅ Multiplexing: N streams song song</text>
  <text class="ts-ok" x="515" y="144" text-anchor="middle">✅ HPACK: nén header 60–90%</text>
  <text class="ts-ok" x="515" y="160" text-anchor="middle">✅ Persistent connection reuse</text>

  <!-- ─── LAYER 2: Serialization ─── -->
  <rect x="20" y="186" width="640" height="18" rx="4" class="lbl-row" stroke-width="0.5"/>
  <text class="ts" x="340" y="197" text-anchor="middle" dominant-baseline="central" style="fill:#534AB7; font-weight:600">② Serialization</text>

  <rect x="20"  y="208" width="290" height="80" rx="6" class="cell-old" stroke-width="0.5"/>
  <text class="th"  x="165" y="226" text-anchor="middle" dominant-baseline="central">JSON / XML — text, human-readable</text>
  <text class="ts-bad" x="165" y="244" text-anchor="middle">❌ Key tên lặp lại mỗi record ("id", "status"…)</text>
  <text class="ts-bad" x="165" y="260" text-anchor="middle">❌ Parse string → type tốn CPU</text>
  <text class="ts-bad" x="165" y="276" text-anchor="middle">❌ Payload 3–10× lớn hơn Protobuf</text>

  <rect x="370" y="208" width="290" height="80" rx="6" class="cell-new" stroke-width="0.5"/>
  <text class="th"  x="515" y="226" text-anchor="middle" dominant-baseline="central">Protobuf — binary field numbers</text>
  <text class="ts-ok" x="515" y="244" text-anchor="middle">✅ Field number thay key text (1 byte)</text>
  <text class="ts-ok" x="515" y="260" text-anchor="middle">✅ Varint: số nhỏ = 1 byte</text>
  <text class="ts-ok" x="515" y="276" text-anchor="middle">✅ 3–10× nhỏ hơn JSON cùng data</text>

  <!-- ─── LAYER 3: Schema contract ─── -->
  <rect x="20" y="302" width="640" height="18" rx="4" class="lbl-row" stroke-width="0.5"/>
  <text class="ts" x="340" y="313" text-anchor="middle" dominant-baseline="central" style="fill:#534AB7; font-weight:600">③ Schema contract</text>

  <rect x="20"  y="324" width="290" height="80" rx="6" class="cell-old" stroke-width="0.5"/>
  <text class="th"  x="165" y="342" text-anchor="middle" dominant-baseline="central">WSDL / OpenAPI — optional</text>
  <text class="ts-bad" x="165" y="360" text-anchor="middle">❌ Schema validation tùy chọn</text>
  <text class="ts-bad" x="165" y="376" text-anchor="middle">❌ Breaking change phát hiện ở runtime</text>
  <text class="ts-bad" x="165" y="392" text-anchor="middle">❌ Client code viết tay, dễ sai</text>

  <rect x="370" y="324" width="290" height="80" rx="6" class="cell-new" stroke-width="0.5"/>
  <text class="th"  x="515" y="342" text-anchor="middle" dominant-baseline="central">.proto — single source of truth</text>
  <text class="ts-ok" x="515" y="360" text-anchor="middle">✅ Strict typing, bắt buộc</text>
  <text class="ts-ok" x="515" y="376" text-anchor="middle">✅ Breaking change = BUILD FAIL</text>
  <text class="ts-ok" x="515" y="392" text-anchor="middle">✅ protoc gen stub + interface 10+ ngôn ngữ</text>

  <!-- ─── LAYER 4: Streaming ─── -->
  <rect x="20" y="418" width="640" height="18" rx="4" class="lbl-row" stroke-width="0.5"/>
  <text class="ts" x="340" y="429" text-anchor="middle" dominant-baseline="central" style="fill:#534AB7; font-weight:600">④ Streaming</text>

  <rect x="20"  y="440" width="290" height="80" rx="6" class="cell-old" stroke-width="0.5"/>
  <text class="th"  x="165" y="458" text-anchor="middle" dominant-baseline="central">Polling / SSE / WebSocket — workaround</text>
  <text class="ts-bad" x="165" y="476" text-anchor="middle">❌ Polling: waste bandwidth + latency</text>
  <text class="ts-bad" x="165" y="492" text-anchor="middle">❌ SSE: chỉ server→client, untyped</text>
  <text class="ts-bad" x="165" y="508" text-anchor="middle">❌ WebSocket: no schema, tự define protocol</text>

  <rect x="370" y="440" width="290" height="80" rx="6" class="cell-new" stroke-width="0.5"/>
  <text class="th"  x="515" y="458" text-anchor="middle" dominant-baseline="central">4 streaming modes — native + typed</text>
  <text class="ts-ok" x="515" y="476" text-anchor="middle">✅ Unary / Server / Client stream</text>
  <text class="ts-ok" x="515" y="492" text-anchor="middle">✅ Bidirectional full-duplex</text>
  <text class="ts-ok" x="515" y="508" text-anchor="middle">✅ Strongly typed, backpressure native</text>

  <!-- Summary -->
  <rect x="20" y="534" width="640" height="30" rx="8" class="sum-purple" stroke-width="0.8"/>
  <text class="th" x="340" y="552" text-anchor="middle" dominant-baseline="central" style="fill:#3C3489">gRPC không phát minh lại RPC — nó ghép đúng HTTP/2 + Protobuf + Code gen vào đúng lúc (2015)</text>
</svg>
