<svg xmlns="http://www.w3.org/2000/svg" width="680" height="440" viewBox="0 0 680 440" role="img">
  <title>REST vs GraphQL vs Webhook vs gRPC — Communication Flows</title>
  <desc>Minh họa sự khác biệt cơ bản giữa 4 pattern API</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; }
      .th  { font-size: 13px; font-weight: 600; }
      .ts  { font-size: 11px; font-weight: 400; fill: #555; }
      .box-gray   { fill: #f5f5f5; stroke: #bbb; }
      .box-green  { fill: #EAF3DE; stroke: #3B6D11; }
      .box-blue   { fill: #E6F1FB; stroke: #185FA5; }
      .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
      .box-purple { fill: #EEEDFE; stroke: #534AB7; }
      .bg-light   { fill: #fafafa; stroke: #ddd; }
      .arr-green  { fill: none; stroke: #3B6D11; stroke-width: 1.2; marker-end: url(#arrow); }
      .arr-blue   { fill: none; stroke: #185FA5; stroke-width: 1.2; marker-end: url(#arrow); }
      .arr-amber  { fill: none; stroke: #854F0B; stroke-width: 1.2; marker-end: url(#arrow); }
      .arr-purple { fill: none; stroke: #534AB7; stroke-width: 1.2; marker-end: url(#arrow); }
      .arr-gray   { fill: none; stroke: #888; stroke-width: 1; marker-end: url(#arrow); }
      .div        { stroke: #ddd; stroke-width: 0.5; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <!-- Section headers -->
  <text class="th" x="78"  y="22" text-anchor="middle">REST API</text>
  <text class="ts" x="78"  y="36" text-anchor="middle">Client pull · HTTP/1.1</text>

  <text class="th" x="248" y="22" text-anchor="middle">GraphQL</text>
  <text class="ts" x="248" y="36" text-anchor="middle">Flexible pull · 1 endpoint</text>

  <text class="th" x="418" y="22" text-anchor="middle">Webhook</text>
  <text class="ts" x="418" y="36" text-anchor="middle">Server push · HTTP/1.1</text>

  <text class="th" x="594" y="22" text-anchor="middle">gRPC</text>
  <text class="ts" x="594" y="36" text-anchor="middle">RPC · HTTP/2 · Protobuf</text>

  <line x1="165" y1="12" x2="165" y2="425" class="div"/>
  <line x1="335" y1="12" x2="335" y2="425" class="div"/>
  <line x1="504" y1="12" x2="504" y2="425" class="div"/>

  <!-- ═══════ REST ═══════ -->
  <rect x="14" y="52" width="64" height="36" rx="6" class="box-green" stroke-width="0.8"/>
  <text class="th" x="46" y="70" text-anchor="middle" dominant-baseline="central">Client</text>

  <rect x="102" y="52" width="52" height="36" rx="6" class="box-gray" stroke-width="0.8"/>
  <text class="th" x="128" y="63" text-anchor="middle" dominant-baseline="central">Server</text>
  <text class="ts" x="128" y="79" text-anchor="middle" dominant-baseline="central">/api/v1</text>

  <line x1="78" y1="64" x2="100" y2="64" class="arr-green"/>
  <text class="ts" x="89" y="58" text-anchor="middle">GET /res</text>
  <path d="M102 76 L78 76" class="arr-gray"/>
  <text class="ts" x="89" y="88" text-anchor="middle">{full JSON}</text>

  <rect x="14" y="106" width="140" height="26" rx="5" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="84" y="119" text-anchor="middle" style="fill:#aa5500">⚠ May over-fetch</text>

  <!-- REST: N requests -->
  <rect x="14" y="148" width="50" height="30" rx="5" class="box-green" stroke-width="0.7"/>
  <text class="ts" x="39" y="163" text-anchor="middle" dominant-baseline="central">Client</text>
  <rect x="100" y="138" width="54" height="20" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="127" y="148" text-anchor="middle" dominant-baseline="central">/users/1</text>
  <rect x="100" y="162" width="54" height="20" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="127" y="172" text-anchor="middle" dominant-baseline="central">/orders/</text>
  <rect x="100" y="186" width="54" height="20" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="127" y="196" text-anchor="middle" dominant-baseline="central">/products/</text>
  <path d="M64 158 L98 148" class="arr-green" stroke-width="0.8"/>
  <path d="M64 163 L98 172" class="arr-green" stroke-width="0.8"/>
  <path d="M64 168 L98 194" class="arr-green" stroke-width="0.8"/>
  <text class="ts" x="84" y="218" text-anchor="middle">N req for N resources</text>

  <!-- ═══════ GraphQL ═══════ -->
  <rect x="178" y="52" width="56" height="36" rx="6" class="box-blue" stroke-width="0.8"/>
  <text class="th" x="206" y="70" text-anchor="middle" dominant-baseline="central">Client</text>

  <rect x="268" y="52" width="52" height="36" rx="6" class="box-gray" stroke-width="0.8"/>
  <text class="th" x="294" y="63" text-anchor="middle" dominant-baseline="central">Server</text>
  <text class="ts" x="294" y="79" text-anchor="middle" dominant-baseline="central">/graphql</text>

  <line x1="234" y1="64" x2="266" y2="64" class="arr-blue"/>
  <text class="ts" x="250" y="58" text-anchor="middle">query{}</text>
  <path d="M268 76 L234 76" class="arr-gray"/>
  <text class="ts" x="250" y="88" text-anchor="middle">exact fields only</text>

  <rect x="178" y="106" width="140" height="26" rx="5" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="248" y="119" text-anchor="middle" style="fill:#0f6e56">✓ No over-fetching</text>

  <!-- GQL: 1 query → N resolvers -->
  <rect x="178" y="148" width="50" height="30" rx="5" class="box-blue" stroke-width="0.7"/>
  <text class="ts" x="203" y="163" text-anchor="middle" dominant-baseline="central">Client</text>
  <rect x="265" y="138" width="52" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="291" y="147" text-anchor="middle" dominant-baseline="central">UserRes.</text>
  <rect x="265" y="160" width="52" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="291" y="169" text-anchor="middle" dominant-baseline="central">DocRes.</text>
  <rect x="265" y="182" width="52" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="291" y="191" text-anchor="middle" dominant-baseline="central">WFRes.</text>
  <path d="M228 158 L263 147" class="arr-blue" stroke-width="0.8"/>
  <path d="M228 163 L263 169" class="arr-blue" stroke-width="0.8"/>
  <path d="M228 168 L263 189" class="arr-blue" stroke-width="0.8"/>
  <text class="ts" x="248" y="218" text-anchor="middle">1 query → N resolvers</text>

  <!-- ═══════ WEBHOOK ═══════ -->
  <rect x="346" y="52" width="66" height="36" rx="6" class="box-gray" stroke-width="0.8"/>
  <text class="th" x="379" y="63" text-anchor="middle" dominant-baseline="central">Producer</text>
  <text class="ts" x="379" y="79" text-anchor="middle" dominant-baseline="central">event occurs</text>

  <rect x="438" y="52" width="50" height="36" rx="6" class="box-amber" stroke-width="0.8"/>
  <text class="th" x="463" y="70" text-anchor="middle" dominant-baseline="central">Receiver</text>

  <line x1="412" y1="64" x2="436" y2="64" class="arr-amber"/>
  <text class="ts" x="424" y="58" text-anchor="middle">POST /hook</text>
  <text class="ts" x="424" y="88" text-anchor="middle">fire-and-forget</text>

  <rect x="346" y="106" width="140" height="26" rx="5" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="416" y="119" text-anchor="middle" style="fill:#0f6e56">✓ Real-time push</text>

  <!-- Webhook: outbox stack -->
  <rect x="346" y="148" width="66" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="379" y="157" text-anchor="middle" dominant-baseline="central">Service+DB</text>
  <rect x="346" y="170" width="66" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="379" y="179" text-anchor="middle" dominant-baseline="central">Outbox</text>
  <rect x="346" y="192" width="66" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="379" y="201" text-anchor="middle" dominant-baseline="central">Poller+retry</text>
  <rect x="440" y="148" width="46" height="62" rx="5" class="box-amber" stroke-width="0.7"/>
  <text class="ts" x="463" y="179" text-anchor="middle" dominant-baseline="central">Recv.</text>
  <line x1="346" y1="157" x2="346" y2="170" stroke="#bbb" stroke-width="0.8"/>
  <line x1="346" y1="179" x2="346" y2="192" stroke="#bbb" stroke-width="0.8"/>
  <path d="M412 201 L438 190" class="arr-amber" stroke-width="1"/>
  <text class="ts" x="416" y="218" text-anchor="middle">Outbox = guaranteed</text>

  <!-- ═══════ gRPC ═══════ -->
  <rect x="516" y="52" width="56" height="36" rx="6" class="box-purple" stroke-width="0.8"/>
  <text class="th" x="544" y="70" text-anchor="middle" dominant-baseline="central">Client</text>

  <rect x="604" y="52" width="58" height="36" rx="6" class="box-gray" stroke-width="0.8"/>
  <text class="th" x="633" y="63" text-anchor="middle" dominant-baseline="central">Server</text>
  <text class="ts" x="633" y="79" text-anchor="middle" dominant-baseline="central">:50051</text>

  <line x1="572" y1="64" x2="602" y2="64" class="arr-purple"/>
  <text class="ts" x="587" y="58" text-anchor="middle">stub.Call()</text>
  <path d="M604 76 L572 76" class="arr-gray"/>
  <text class="ts" x="587" y="88" text-anchor="middle">Protobuf binary</text>

  <rect x="516" y="106" width="148" height="26" rx="5" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="590" y="119" text-anchor="middle" style="fill:#534AB7">🚀 HTTP/2 · Binary · Fast</text>

  <!-- gRPC: 4 streaming modes -->
  <rect x="516" y="148" width="148" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="590" y="157" text-anchor="middle" dominant-baseline="central">Unary: req → res (≈ REST)</text>

  <rect x="516" y="170" width="148" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="590" y="179" text-anchor="middle" dominant-baseline="central">Server stream: req → stream</text>

  <rect x="516" y="192" width="148" height="18" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="ts" x="590" y="201" text-anchor="middle" dominant-baseline="central">Client stream: stream → res</text>

  <rect x="516" y="214" width="148" height="18" rx="4" class="box-purple" stroke-width="0.8"/>
  <text class="ts" x="590" y="223" text-anchor="middle" dominant-baseline="central" style="fill:#3C3489">Bidi stream: ⇄ full-duplex</text>

  <text class="ts" x="590" y="243" text-anchor="middle">4 RPC modes, 1 framework</text>

  <!-- Protocol badges row -->
  <rect x="14"  y="258" width="140" height="28" rx="5" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="84"  y="272" text-anchor="middle">HTTP/1.1  ·  JSON</text>
  <text class="ts" x="84"  y="282" text-anchor="middle">Human-readable ✅  Cache ✅</text>

  <rect x="178" y="258" width="140" height="28" rx="5" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="248" y="272" text-anchor="middle">HTTP/1.1  ·  JSON</text>
  <text class="ts" x="248" y="282" text-anchor="middle">Flexible query ✅  Cache ⚠</text>

  <rect x="346" y="258" width="140" height="28" rx="5" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="416" y="272" text-anchor="middle">HTTP/1.1  ·  JSON</text>
  <text class="ts" x="416" y="282" text-anchor="middle">Push ✅  Retry needed ⚠</text>

  <rect x="516" y="258" width="148" height="28" rx="5" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="590" y="272" text-anchor="middle">HTTP/2  ·  Protobuf binary</text>
  <text class="ts" x="590" y="282" text-anchor="middle">Throughput ✅  Browser ❌</text>

  <!-- Performance bar visual -->
  <text class="ts" x="340" y="310" text-anchor="middle" style="fill:#888">Relative throughput (same hardware, internal service call)</text>
  <rect x="14"  y="320" width="28"  height="14" rx="3" fill="#3B6D11" opacity="0.6"/>
  <text class="ts" x="50"  y="329" dominant-baseline="central">REST ~10k rps</text>
  <rect x="178" y="320" width="22"  height="14" rx="3" fill="#185FA5" opacity="0.6"/>
  <text class="ts" x="208" y="329" dominant-baseline="central">GQL ~8k rps</text>
  <rect x="346" y="320" width="6"   height="14" rx="3" fill="#854F0B" opacity="0.5"/>
  <text class="ts" x="360" y="329" dominant-baseline="central">Webhook N/A</text>
  <rect x="516" y="320" width="140" height="14" rx="3" fill="#534AB7" opacity="0.7"/>
  <text class="ts" x="590" y="329" text-anchor="middle" dominant-baseline="central" style="fill:#fff">gRPC 50k+ rps</text>

  <!-- Legend footer -->
  <rect x="14" y="350" width="652" height="30" rx="6" class="bg-light" stroke-width="0.5"/>
  <text class="ts" x="340" y="363" text-anchor="middle">REST = resource pull  ·  GraphQL = flexible pull  ·  Webhook = server push  ·  gRPC = typed RPC + streaming</text>
  <text class="ts" x="340" y="375" text-anchor="middle">Production: REST (external) + gRPC (internal) + Webhook (events) là combination phổ biến nhất</text>
</svg>
