<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debezium Durability — Zero Data Loss Timeline</title>
<style>
  :root {
    --bg: #1e1e2e; --text: #cdd6f4; --text2: #a6adc8; --text3: #6c7086;
    --surface: #2a2a3e; --surface2: #313145; --border: #45475a;
    --green: #a6e3a1; --green-bg: #1e3a2e; --green-border: #2d5a3d;
    --red: #f38ba8; --red-bg: #3a1e2a; --red-border: #5a2d3d;
    --amber: #f9e2af; --amber-bg: #3a2e10; --amber-border: #6a5018;
    --teal: #94e2d5;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #eff1f5; --text: #4c4f69; --text2: #6c6f85; --text3: #9ca0b0;
      --surface: #e6e9ef; --surface2: #dce0e8; --border: #ccd0da;
      --green: #40a02b; --green-bg: #e8f5e0; --green-border: #b5d9a0;
      --red: #d20f39; --red-bg: #fce8ee; --red-border: #f0a0b5;
      --amber: #df8e1d; --amber-bg: #fef3d8; --amber-border: #f9e2af;
      --teal: #179299;
    }
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,'Segoe UI',sans-serif; font-size:13px; padding:16px; }
  svg { width:100%; height:auto; display:block; }
  .t  { font: 400 14px/1.4 -apple-system,'Segoe UI',sans-serif; fill:var(--text); }
  .ts { font: 400 12px/1.4 -apple-system,'Segoe UI',sans-serif; fill:var(--text2); }
  .th { font: 500 14px/1.4 -apple-system,'Segoe UI',sans-serif; fill:var(--text); }
  .c-amber rect { fill:var(--amber-bg); stroke:var(--amber-border); } .c-amber .th,.c-amber .ts { fill:var(--amber); }
  .c-teal rect { fill:#1a3535; stroke:#2a5555; } .c-teal .th,.c-teal .ts { fill:var(--teal); }
  @media (prefers-color-scheme: light) {
    .c-amber rect { fill:var(--amber-bg); stroke:var(--amber-border); }
    .c-teal rect { fill:#d8f5f3; stroke:#94e2d5; } .c-teal .th,.c-teal .ts { fill:#179299; }
  }
</style>
</head>
<body>
<svg viewBox="0 0 680 310" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Debezium durability: zero data loss khi connector bị down</title>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<!-- Timeline bar background -->
<rect x="40" y="80" width="600" height="8" rx="4" fill="var(--surface2)" stroke="var(--border)" stroke-width="0.5"/>
<!-- Phases -->
<rect x="40" y="80" width="140" height="8" rx="4" fill="#a6e3a1"/>
<rect x="180" y="80" width="260" height="8" rx="0" fill="#f38ba8"/>
<rect x="440" y="80" width="100" height="8" rx="0" fill="#f9e2af"/>
<rect x="540" y="80" width="100" height="8" rx="4" fill="#a6e3a1"/>
<!-- Time markers (dashed lines) -->
<line x1="180" y1="70" x2="180" y2="98" stroke="var(--text3)" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="440" y1="70" x2="440" y2="98" stroke="var(--text3)" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="540" y1="70" x2="540" y2="98" stroke="var(--text3)" stroke-width="1" stroke-dasharray="3 3"/>
<!-- Time labels -->
<text class="ts" x="40" y="68" text-anchor="start">08:00</text>
<text class="ts" x="176" y="68" text-anchor="middle">09:00</text>
<text class="ts" x="440" y="68" text-anchor="middle">11:00</text>
<text class="ts" x="540" y="68" text-anchor="middle">11:05</text>
<text class="ts" x="640" y="68" text-anchor="end">11:30</text>
<!-- Phase labels -->
<text class="ts" x="110" y="113" text-anchor="middle" fill="#a6e3a1">Streaming normal</text>
<text class="ts" x="310" y="113" text-anchor="middle" fill="#f38ba8">Connector DOWN</text>
<text class="ts" x="490" y="113" text-anchor="middle" fill="#f9e2af">Catch-up</text>
<text class="ts" x="590" y="113" text-anchor="middle" fill="#a6e3a1">Normal</text>
<!-- WAL bar -->
<text class="ts" x="40" y="145" text-anchor="start">PostgreSQL WAL:</text>
<g class="c-amber"><rect x="40" y="155" width="140" height="28" rx="4" stroke-width="0.5"/><text class="ts" x="110" y="169" text-anchor="middle" dominant-baseline="central">WAL consumed</text></g>
<g class="c-amber"><rect x="180" y="155" width="260" height="28" rx="4" stroke-width="0.5"/><text class="ts" x="310" y="169" text-anchor="middle" dominant-baseline="central">WAL tích lũy — replication slot GIỮ lại không xóa</text></g>
<g class="c-teal"><rect x="440" y="155" width="200" height="28" rx="4" stroke-width="0.5"/><text class="ts" x="540" y="169" text-anchor="middle" dominant-baseline="central">WAL consumed → slot tiến lên</text></g>
<!-- Event markers -->
<circle cx="180" cy="84" r="5" fill="#f38ba8"/>
<line x1="180" y1="89" x2="180" y2="143" stroke="#f38ba8" stroke-width="1" stroke-dasharray="3 3"/>
<text class="ts" x="184" y="200" fill="#f38ba8">⚡ Connector crash</text>
<text class="ts" x="184" y="215" fill="#f38ba8">Replication slot</text>
<text class="ts" x="184" y="229" fill="#f38ba8">vẫn tồn tại trong PG</text>
<circle cx="440" cy="84" r="5" fill="#a6e3a1"/>
<line x1="440" y1="89" x2="440" y2="143" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="3 3"/>
<text class="ts" x="444" y="200" fill="#a6e3a1">Connector restart</text>
<text class="ts" x="444" y="215" fill="#a6e3a1">Đọc offset từ</text>
<text class="ts" x="444" y="229" fill="#a6e3a1">connect-offsets</text>
<text class="ts" x="444" y="244" fill="#a6e3a1">Resume từ LSN cũ</text>
<circle cx="540" cy="84" r="5" fill="#a6e3a1"/>
<!-- Result -->
<rect x="40" y="265" width="600" height="36" rx="8" fill="var(--green-bg)" stroke="var(--green-border)" stroke-width="0.5"/>
<text class="ts" x="340" y="277" text-anchor="middle" fill="#a6e3a1">✓ 2 giờ down → ZERO data loss. Tất cả events trong 09:00–11:00 được replay đầy đủ.</text>
<text class="ts" x="340" y="293" text-anchor="middle" fill="#a6e3a1">⚠ Monitor WAL size nếu down lâu — disk có thể đầy. Alert khi lag &gt; 5GB.</text>
</svg>
</body>
</html>
